applicationEnvironment: prod

deployment:
  env:
    - name: spring.profiles.active
      value: prod
    - name: database.connection.string
      value: 'jdbc:oracle:thin:@(DESCRIPTION =(LOAD_BALANCE=on)(ADDRESS_LIST =(ADDRESS = (PROTOCOL = TCP)(HOST=rdupxa-cus01.labcorp.com)(PORT=1522))(ADDRESS = (PROTOCOL = TCP)(HOST=rdupxa-cus02.labcorp.com)(PORT=1522)))(CONNECT_DATA=(SERVICE_NAME = LCEPSP1_prim)))'
    - name: JAVA_OPTIONS
      value: >-
        -XshowSettings:vm
        -XX:InitialRAMPercentage=70
        -XX:MaxRAMPercentage=70
        -XX:+UseParallelGC
        -Dcom.labcorp.app.env=prod
    - name: database.username
      valueFrom:
        secretKeyRef:
          name: service-credentials
          key: database.user
    - name: database.password
      valueFrom:
        secretKeyRef:
          name: service-credentials
          key: database.password
    - name: quartz.database.username
      valueFrom:
        secretKeyRef:
          name: service-credentials
          key: quartz.database.user
    - name: quartz.database.password
      valueFrom:
        secretKeyRef:
          name: service-credentials
          key: quartz.database.password
  replicaCount: 1
  deploymentStrategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "250m"

route:
  enabled: true
  componentType: "api"
  name: eps-scheduler-services-prod
  host: eps-scheduler-services-prod.apps.ocpprd.labcorp.com
  path: /
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Allow
  wildcardPolicy: None
  annotations:
    haproxy.router.openshift.io/timeout: 2h
