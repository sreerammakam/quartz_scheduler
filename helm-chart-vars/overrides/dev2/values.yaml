applicationEnvironment: dev2
fullnameOverride: eps-scheduler-services-dev2

deployment:
  env:
    - name: spring.profiles.active
      value: dev2
    - name: database.connection.string
      value: 'jdbc:oracle:thin:@//rdutxa-cus01.labcorp.com:1522,rdutxa-cus02.labcorp.com:1522/lcepsd2_rw'
    - name: JAVA_OPTIONS
      value: >-
        -XshowSettings:vm
        -XX:InitialRAMPercentage=50
        -XX:MaxRAMPercentage=50
        -XX:+UseParallelGC
        -Dcom.labcorp.app.env=dev2
    - name: database.username
      valueFrom:
        secretKeyRef:
          name: service-credentials-dev2
          key: database.user
    - name: database.password
      valueFrom:
        secretKeyRef:
          name: service-credentials-dev2
          key: database.passwords
    - name: quartz.database.username
      valueFrom:
        secretKeyRef:
          name: service-credentials-dev2
          key: quartz.database.user
    - name: quartz.database.password
      valueFrom:
        secretKeyRef:
          name: service-credentials-dev2
          key: quartz.database.password
  replicaCount: 1
  resources:
    requests:
      memory: "200Mi"
      cpu: "150m"
    limits:
      memory: "1Gi"
      cpu: "375m"

service:
  name: eps-scheduler-services-dev2
  port: 8080

route:
  enabled: true
  componentType: "api"
  name: eps-scheduler-services-dev2
  host: eps-scheduler-services-dev2.apps.ocpdtq.labcorp.com
  path: /
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Allow
  wildcardPolicy: None
  annotations:
    haproxy.router.openshift.io/timeout: 2h
