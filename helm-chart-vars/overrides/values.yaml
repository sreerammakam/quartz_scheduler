fullnameOverride: eps-scheduler-services
applicationName: eps-scheduler-services

service:
  name: eps-scheduler-services
  port: 8080

deployment:
  healthCheck:
    readinessProbe:
      url: /actuator/health/readiness
      initialDelaySeconds: 160
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    livenessProbe:
      url: /actuator/health/liveness
      initialDelaySeconds: 240
      timeoutSeconds: 10
      periodSeconds: 30
      successThreshold: 1
      failureThreshold: 10
